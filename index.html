<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Cuaca</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🌤️ Cek Cuaca</h1>

        <!-- Bagian untuk mencari kota -->
        <div class="search-area">
            <input type="text" id="cityInput" placeholder="Masukkan nama kota...">
            <button id="searchBtn">Cari</button>
        </div>

        <!-- Tempat informasi cuaca akan ditampilkan -->
        <div id="weatherDisplay" class="weather-display">
            <!-- Akan diisi oleh JavaScript -->
            <p>Silakan cari kota untuk melihat cuaca.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
